services:
  nginx:
    # image: nginx:alpine
    build: ./nginx
    container_name: nginx
    ports:
      - "80:80"
    # volumes:
    #   - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - app-network
    depends_on:
      - backend1
      - backend2
      - backend3

  backend1:
    build: ./backend
    container_name: backend1
    environment:
      - PORT=3000
      - SERVER_ID=1        # переменная для идентификации экземпляра в ответе
    networks:
      - app-network

  backend2:
    build: ./backend
    container_name: backend2
    environment:
      - PORT=3000
      - SERVER_ID=2
    networks:
      - app-network

  backend3:
    build: ./backend
    container_name: backend3
    environment:
      - PORT=3000
      - SERVER_ID=3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge